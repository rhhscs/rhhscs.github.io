---
layout: default
---

<div class="py-3 text-light">
  {{ page.content | markdownify }}
</div>




{% for post in site.posts %}
  {%- if post.group == page.group and post.archived == false -%}
    <a href="{{ post.url }}" class="text-decoration-none lesson d-block">
      <div class="card text-dark w-100">
        <div class="card-body">
          {{ post.date|date_to_string }}  
          <h3>{{ post.title }}</h3>
        </div>

      </div>

    </a>
  {%- endif -%}
{% endfor %}
